databases:
  - name: golazo-db
    databaseName: golazo_production
    user: golazo
    plan: free

services:
  - type: web
    name: golazo-app
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: golazo-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false        # set manually in Render dashboard
      - key: RAPIDAPI_KEY
        sync: false        # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # set to your Render URL once deployed, e.g. https://golazo-app.onrender.com
      - key: RAILS_LOG_LEVEL
        value: info
      - key: WEB_CONCURRENCY
        value: 1

  # Background worker — runs SolidQueue to process recurring sync jobs
  # (live scores refresh, standings, etc.)
  # Upgrade to a paid plan or remove this if staying on free tier.
  - type: worker
    name: golazo-worker
    runtime: docker
    plan: free
    dockerCommand: bundle exec rails solid_queue:start
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: golazo-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
