databases:
  - name: golazo-db
    databaseName: golazo_production
    user: golazo
    plan: free

services:
  - type: web
    name: golazo-app
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: golazo-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false        # set manually in Render dashboard
      - key: RAPIDAPI_KEY
        sync: false        # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false        # set to your Render URL once deployed, e.g. https://golazo-app.onrender.com
      - key: ADMIN_API_TOKEN
        sync: false        # Bearer token for the write endpoints; set manually in Render dashboard
      - key: SENTRY_DSN
        sync: false        # optional error monitoring; leave unset to disable
      - key: VAPID_PUBLIC_KEY
        sync: false        # Web Push VAPID public key — generate with: rails webpush:generate_keys
      - key: VAPID_PRIVATE_KEY
        sync: false        # Web Push VAPID private key — keep secret
      - key: VAPID_SUBJECT
        sync: false        # mailto: address for push contact, e.g. mailto:you@example.com
      - key: RAILS_LOG_LEVEL
        value: info
      - key: WEB_CONCURRENCY
        value: 1
