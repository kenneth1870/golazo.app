default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", ENV["USER"]) %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: golazo_development

test:
  <<: *default
  database: golazo_test

production:
  <<: *default
  database: golazo_production
  username: golazo
  password: <%= ENV["GOLAZO_DATABASE_PASSWORD"] %>
