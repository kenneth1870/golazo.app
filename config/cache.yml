default: &default
  store_options:
    # Cap age of oldest cache entry to fulfill retention policies
    max_age: <%= 60.days.to_i %>
    max_size: <%= 256.megabytes %>
    namespace: <%= Rails.env %>

development:
  <<: *default

test:
  <<: *default

# No `database:`/`connects_to:` key → Solid Cache uses the primary database
# (this app runs a single Postgres DB, same as Solid Queue).
production:
  <<: *default
