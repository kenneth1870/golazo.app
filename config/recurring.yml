# Single source of truth for Solid Queue recurring tasks (do not also define
# these under a dispatcher's `recurring_tasks` in queue.yml — that double-runs
# them). Production-only on purpose: each run hits the paid RapidAPI, so we
# don't want them firing during local development.
production:
  sync_live_scores:
    class: SyncLiveScoresJob
    schedule: "every 1 minute"
    queue: default

  sync_today_matches:
    class: SyncTodayMatchesJob
    schedule: "every 10 minutes"
    queue: default

  sync_standings:
    class: SyncStandingsJob
    schedule: "every 5 minutes"
    queue: default

  recalculate_standings:
    class: RecalculateStandingsJob
    schedule: "every 5 minutes"
    queue: default

  sync_pre_match_data:
    class: SyncPreMatchDataJob
    schedule: "every 5 minutes"
    queue: default

  pre_match_notifications:
    class: PreMatchNotificationJob
    schedule: "every 2 minutes"
    queue: default
