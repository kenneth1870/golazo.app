# Recurring tasks live in config/recurring.yml (the Solid Queue convention),
# NOT here. Defining them in both files double-schedules every sync.
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: [critical, default]
      threads: 2
      polling_interval: 0.5

development:
  <<: *default

production:
  <<: *default
