default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
      recurring_tasks:
        sync_live_matches:
          class: SyncLiveMatchesJob
          schedule: "every 1 minute"
          queue: default
        sync_today_matches:
          class: SyncTodayMatchesJob
          schedule: "every 10 minutes"
          queue: default
        sync_standings:
          class: SyncStandingsJob
          schedule: "every 30 minutes"
          queue: default
  workers:
    - queues: "*"
      threads: 3
      polling_interval: 0.5

development:
  <<: *default

production:
  <<: *default
  workers:
    - queues: "*"
      threads: 5
      polling_interval: 0.5
